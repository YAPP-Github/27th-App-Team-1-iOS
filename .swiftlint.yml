# 검사에서 제외할 디렉토리 지정
excluded:
  - Tuist
  - Tuist/Dependencies
  - Carthage
  - Pods
  - .build
  - Derived
  - fastlane
  - "**/*.generated.swift"
  - "**/Derived/**"
  - "**/*.tuist.generated.swift"
  - "**/TuistBundle+*.swift"
  - "**/TuistAssets+*.swift"
  - "**/Project.swift"
  - Scripts

# 추가로 활성화할 규칙들
opt_in_rules:
 - empty_count # count == 0 대신 isEmpty 사용 권장
 - empty_string # "" 대신 String() 사용 권장
 - fatal_error_message # fatalError 메시지 필수
 - first_where # filter().first 대신 first(where:) 사용 권장
 - force_unwrapping # 강제 언래핑(!) 사용 제한
 - implicit_return # 암시적 return 사용 제한
 - modifier_order # 수정자 순서 강제
 - operator_usage_whitespace # 연산자 주변 공백
 - sorted_imports # import 알파벳 순 정렬

# 비활성화할 일반적인 규칙
disabled_rules:
 - trailing_whitespace
 - todo
 - nesting
 - trailing_newline
 - multiple_closures_with_trailing_closure
 - leading_whitespace
 - function_body_length

# 타입 이름 글자 수 설정
type_name:
  min_length: 2 # 최소 길이를 2자로 하향 조정 (기본값 3)
  max_length:
    warning: 40
    error: 50

# 라인 길이 설정
line_length:
 warning: 120
 error: 300

# 타입 본문 길이 설정
type_body_length:
 warning: 400
 error: 500

analyzer_rules:
 - unused_import # 사용하지 않는 import
